<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>繪本閱讀中...</title>
  
  <!-- 引入 jQuery (翻頁套件基礎) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  
  <!-- 引入 dFlip 翻頁書套件的 CSS 與 JS -->
  <link href="https://cdn.jsdelivr.net/npm/dflip@2.2.1/css/dflip.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/dflip@2.2.1/css/themify-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/dflip@2.2.1/js/dflip.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      background-attachment: fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    
    .header {
      padding: 15px 20px;
      text-align: left;
      z-index: 10;
    }
    
    .back-btn {
      display: inline-block;
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }
    
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.8);
      transform: translateY(-2px);
    }

    .container {
      flex: 1;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- 返回按鈕 -->
  <div class="header">
    <a href="index.html" class="back-btn">⬅ 返回書架</a>
  </div>

  <!-- 繪本呈現區 -->
  <div class="container">
    <div id="flipbookContainer"></div>
  </div>

  <script>
    // 取得網址列的 book 參數
    const urlParams = new URLSearchParams(window.location.search);
    const bookFileName = urlParams.get('book');

    if (bookFileName) {
      // 確保這裡乾乾淨淨指向 pdfs/
      const pdfPath = "pdfs/" + bookFileName;

      $(document).ready(function () {
          $("#flipbookContainer").flipBook(pdfPath, {
              backgroundColor: "transparent", 
              height: "100%",
              direction: 2 
          });
      });
    } else {
      document.getElementById('flipbookContainer').innerHTML = "<h2 style='text-align:center; color:white; margin-top:50px;'>找不到繪本檔案，請回首頁重新選擇。</h2>";
    }
  </script>

</body>
</html>
