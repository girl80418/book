<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>繪本閱讀中...</title>
  
  <link href="https://unpkg.com/dflip@2.2.1/css/dflip.min.css" rel="stylesheet">
  <link href="https://unpkg.com/dflip@2.2.1/css/themify-icons.min.css" rel="stylesheet">
  
  <style>
    /* 強制滿版，避免手機把畫面壓縮 */
    body, html { 
      margin: 0; padding: 0; height: 100%; 
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      overflow: hidden; 
    }
    
    /* 讓按鈕浮動在左上角，不影響書本空間 */
    .header { position: absolute; top: 15px; left: 20px; z-index: 999; }
    .back-btn { 
      padding: 8px 20px; background: rgba(255,255,255,0.8); 
      border-radius: 20px; text-decoration: none; color: #333; 
      font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
    }
    
    /* 書本容器強制佔滿整個螢幕 */
    #flipbookContainer { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html" class="back-btn">⬅ 返回書架</a>
  </div>

  <div id="flipbookContainer"></div>

  <!-- 引入套件 -->
  <script src="https://unpkg.com/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://unpkg.com/dflip@2.2.1/js/dflip.min.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const bookFileName = urlParams.get('book');

    if (bookFileName) {
      const pdfPath = "pdfs/" + bookFileName;
      
      $(document).ready(function () {
          $("#flipbookContainer").flipBook(pdfPath, {
              backgroundColor: "transparent",
              webgl: false // 【關鍵】關閉 WebGL，對手機支援度最高，不會白畫面！
          });
      });
    } else {
      document.getElementById('flipbookContainer').innerHTML = "<h2 style='text-align:center; color:white; margin-top:80px;'>找不到檔案</h2>";
    }
  </script>

</body>
</html>
